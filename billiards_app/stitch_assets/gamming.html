<!DOCTYPE html>

<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BILLIARD BATTLE - Gameplay HUD</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#570008",
                        "on-tertiary-fixed-variant": "#432582",
                        "error-container": "#fb5151",
                        "outline": "#6a7982",
                        "tertiary-fixed-dim": "#b093f6",
                        "error-dim": "#9f0519",
                        "on-background": "#233039",
                        "on-surface": "#233039",
                        "background": "#eff8ff",
                        "primary-dim": "#5c4f00",
                        "primary-container": "#fcdc00",
                        "primary-fixed": "#fcdc00",
                        "secondary-dim": "#005863",
                        "primary": "#695b00",
                        "surface-container-highest": "#cae0ef",
                        "tertiary-container": "#bda1ff",
                        "on-secondary-container": "#004f59",
                        "tertiary-dim": "#5a3e9a",
                        "surface-container": "#d8ebf8",
                        "secondary-fixed-dim": "#00d7f0",
                        "surface-container-high": "#d1e5f3",
                        "on-primary": "#fff3c3",
                        "on-primary-container": "#5a4e00",
                        "surface-tint": "#695b00",
                        "on-primary-fixed": "#453c00",
                        "surface-variant": "#cae0ef",
                        "surface": "#eff8ff",
                        "secondary": "#006571",
                        "on-tertiary-container": "#3a1a79",
                        "on-tertiary-fixed": "#1f0052",
                        "on-surface-variant": "#4f5d67",
                        "inverse-primary": "#fcdc00",
                        "inverse-surface": "#031017",
                        "on-secondary-fixed": "#003a42",
                        "error": "#b31b25",
                        "secondary-container": "#26e6ff",
                        "surface-container-low": "#e3f3ff",
                        "on-secondary": "#d8f8ff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#909fa9",
                        "on-tertiary": "#f8f0ff",
                        "tertiary": "#664aa7",
                        "on-error": "#ffefee",
                        "on-primary-fixed-variant": "#655800",
                        "surface-bright": "#eff8ff",
                        "outline-variant": "#a0afb9",
                        "surface-dim": "#c1d8e7",
                        "primary-fixed-dim": "#ecce00",
                        "on-secondary-fixed-variant": "#005964",
                        "secondary-fixed": "#26e6ff",
                        "tertiary-fixed": "#bda1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .text-impact {
            text-shadow: 4px 4px 0px #664aa7;
            -webkit-text-stroke: 2px #664aa7;
        }

        .slosh-liquid {
            background: linear-gradient(0deg, #4ade80 0%, #22c55e 50%, #86efac 100%);
            box-shadow: 0 0 20px #4ade80;
        }

        .manga-border {
            border: 4px solid #664aa7;
        }

        .manga-shadow {
            box-shadow: 4px 4px 0px 0px #664aa7;
        }

        .aim-line-glow {
            box-shadow: 0 0 15px #26e6ff, 0 0 5px #ffffff;
        }
    </style>
</head>

<body class="bg-background font-body overflow-hidden h-screen w-screen selection:bg-primary-container">
    <!-- Top Navigation Bar (Shared Component Anchor) -->
    <nav
        class="fixed top-0 left-0 w-full h-16 flex justify-between items-center px-8 z-50 bg-[#eff8ff] dark:bg-slate-900 border-b-4 border-[#664aa7] shadow-[4px_4px_0px_0px_rgba(102,74,167,1)]">
        <div class="flex items-center gap-4">
            <span
                class="text-2xl font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-[#664aa7] drop-shadow-[2px_2px_0px_#fcdc00]">BILLIARD
                BATTLE</span>
            <div class="hidden md:flex gap-6 ml-8">
                <span
                    class="font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-[#fcdc00] cursor-pointer hover:scale-105 transition-transform">Home</span>
                <span
                    class="font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-[#664aa7] cursor-pointer hover:scale-105 transition-transform">Cues</span>
                <span
                    class="font-['Plus_Jakarta_Sans'] font-black uppercase tracking-tighter text-[#664aa7] cursor-pointer hover:scale-105 transition-transform">Shop</span>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <button
                class="material-symbols-outlined text-[#664aa7] text-3xl hover:scale-105 transition-transform">star</button>
            <button
                class="material-symbols-outlined text-[#664aa7] text-3xl hover:scale-105 transition-transform">favorite</button>
            <button
                class="material-symbols-outlined text-[#664aa7] text-3xl hover:scale-105 transition-transform">settings</button>
        </div>
    </nav>
    <!-- Side Bar (Shared Component Anchor) -->
    <aside
        class="fixed left-0 top-0 h-full flex flex-col items-center py-6 gap-4 z-40 bg-[#eff8ff] dark:bg-slate-900 w-24 rounded-r-3xl border-r-4 border-[#664aa7] shadow-[4px_0px_0px_0px_rgba(102,74,167,1)] pt-24">
        <div class="flex flex-col items-center gap-1 mb-4">
            <div class="w-14 h-14 rounded-full manga-border overflow-hidden bg-white">
                <img class="w-full h-full object-cover"
                    data-alt="Stylized anime-style pro billiard player profile avatar with energetic expression and spikey hair"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGimsN8In7NeDmwVMbRn7DPbgW7avywNdAqe5gyV-4wzBLTIG_Qfg7ea7QAxE18rUXEQREHQ6FKyWyLTH2qLQWlRPmEKRlzGz0dn2S3-VaukkcOleqkZcqt_-PFq1VYnfDmj2Mtv7zinQx9QLM5glzTuSXZIjbWQShOMyzchwswWuBg2IKBndKlJEpRNDqPBdiQ8XD5Mfe7B1e8GKKlbJPJqtcuC8z7Yoad7ZnSVR6YmulKdrDr4hxL0FpU25v7LzSC412Iglosa4" />
            </div>
            <span class="font-['Plus_Jakarta_Sans'] font-bold text-[10px] text-[#664aa7] text-center leading-tight">PRO
                PLAYER<br /><span class="text-secondary">RANK: SSS</span></span>
        </div>
        <div class="flex flex-col gap-6 items-center">
            <div
                class="flex flex-col items-center gap-1 bg-[#fcdc00] text-[#664aa7] rounded-full border-4 border-[#664aa7] shadow-[2px_2px_0px_#664aa7] p-2 w-16 h-16 justify-center">
                <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">home</span>
            </div>
            <div
                class="flex flex-col items-center gap-1 opacity-80 text-[#664aa7] hover:bg-[#26e6ff] hover:text-white rounded-full transition-all w-14 h-14 justify-center">
                <span class="material-symbols-outlined text-2xl">sports_score</span>
            </div>
            <div
                class="flex flex-col items-center gap-1 opacity-80 text-[#664aa7] hover:bg-[#26e6ff] hover:text-white rounded-full transition-all w-14 h-14 justify-center">
                <span class="material-symbols-outlined text-2xl">shopping_cart</span>
            </div>
        </div>
        <button
            class="mt-auto mb-4 bg-primary-container manga-border manga-shadow w-16 h-16 rounded-full flex items-center justify-center font-['Plus_Jakarta_Sans'] font-black text-xl text-tertiary active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all">GO!</button>
    </aside>
    <!-- Main Game Canvas (16:9 Landscape Layout) -->
    <main class="relative w-full h-full pt-16 pl-24 flex items-center justify-center overflow-hidden">
        <!-- The Billiard Table -->
        <div
            class="relative w-[85%] h-[75%] bg-[#e3f3ff] rounded-[4rem] manga-border shadow-[inset_0_10px_40px_rgba(0,0,0,0.1)] flex items-center justify-center">
            <!-- Table Texture / Pockets -->
            <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
                <div class="absolute -top-4 -left-4 w-16 h-16 bg-tertiary rounded-full border-4 border-[#eff8ff]"></div>
                <div class="absolute -top-4 -right-4 w-16 h-16 bg-tertiary rounded-full border-4 border-[#eff8ff]">
                </div>
                <div class="absolute -bottom-4 -left-4 w-16 h-16 bg-tertiary rounded-full border-4 border-[#eff8ff]">
                </div>
                <div class="absolute -bottom-4 -right-4 w-16 h-16 bg-tertiary rounded-full border-4 border-[#eff8ff]">
                </div>
                <div
                    class="absolute top-1/2 -translate-y-1/2 -left-4 w-14 h-14 bg-tertiary rounded-full border-4 border-[#eff8ff]">
                </div>
                <div
                    class="absolute top-1/2 -translate-y-1/2 -right-4 w-14 h-14 bg-tertiary rounded-full border-4 border-[#eff8ff]">
                </div>
            </div>
            <!-- Game View Overlay -->
            <div class="relative w-full h-full overflow-hidden rounded-[3.5rem] flex items-center justify-center">
                <!-- Aiming Lines -->
                <div
                    class="absolute w-1 h-[400px] bg-secondary-container aim-line-glow rotate-[30deg] origin-bottom -translate-y-12">
                </div>
                <div
                    class="absolute w-1 h-[150px] bg-white opacity-50 rotate-[-45deg] translate-x-24 -translate-y-48 border-l-2 border-dashed border-secondary-container">
                </div>
                <!-- Balls (Cel-shaded stickers) -->
                <div
                    class="absolute w-12 h-12 bg-white rounded-full manga-border flex items-center justify-center shadow-lg -translate-x-32 translate-y-16">
                    <div class="w-6 h-6 bg-surface-dim rounded-full opacity-30 -translate-y-1 -translate-x-1"></div>
                </div>
                <div
                    class="absolute w-12 h-12 bg-error-container rounded-full manga-border flex items-center justify-center shadow-lg translate-x-12 -translate-y-24">
                    <div
                        class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-xs font-black text-tertiary">
                        3</div>
                </div>
                <div
                    class="absolute w-12 h-12 bg-primary-container rounded-full manga-border flex items-center justify-center shadow-lg translate-x-48 translate-y-8">
                    <div
                        class="w-8 h-8 bg-white rounded-full flex items-center justify-center text-xs font-black text-tertiary">
                        9</div>
                </div>
                <!-- Cue Stick -->
                <div
                    class="absolute w-4 h-[600px] bg-gradient-to-b from-[#8B4513] via-[#D2691E] to-[#A0522D] rounded-full manga-border rotate-[30deg] translate-y-64 -translate-x-32 shadow-xl origin-top">
                    <div class="w-full h-8 bg-[#f5f5dc] rounded-t-full"></div>
                    <div class="absolute bottom-0 w-full h-24 bg-[#333] rounded-b-full"></div>
                </div>
            </div>
        </div>
        <!-- Gameplay HUD Elements -->
        <!-- Left Side: Power Slider (動力滑桿) -->
        <div class="absolute left-32 top-1/2 -translate-y-1/2 flex flex-col items-center gap-4">
            <div
                class="w-16 h-80 bg-white/60 backdrop-blur-md manga-border rounded-full relative overflow-hidden flex flex-col justify-end p-1">
                <!-- Glass Tube Liquid -->
                <div class="w-full h-[65%] slosh-liquid rounded-full flex flex-col items-center justify-start pt-4">
                    <div class="w-8 h-2 bg-white/40 rounded-full blur-[1px]"></div>
                </div>
                <!-- Glass Reflection -->
                <div class="absolute top-0 right-3 w-1 h-full bg-white/30 rounded-full"></div>
            </div>
            <div class="bg-tertiary px-4 py-2 rounded-xl manga-shadow">
                <span class="text-white font-black text-sm tracking-widest whitespace-nowrap">動力滑桿</span>
            </div>
        </div>
        <!-- Right Side: Interaction Cluster -->
        <div class="absolute right-12 top-1/2 -translate-y-1/2 flex flex-col gap-8 items-end">
            <!-- Score Multiplier (Display Headline) -->
            <div class="flex flex-col items-end">
                <span
                    class="text-6xl font-['Plus_Jakarta_Sans'] font-black text-primary-container text-impact italic tracking-tighter">X
                    2.5</span>
                <span class="text-tertiary font-black text-xl mr-2">COMBO!</span>
            </div>
            <!-- Direction Slider (方向調整桿) -->
            <div class="flex flex-col items-center gap-3">
                <div class="w-64 h-12 bg-white manga-border rounded-full relative flex items-center p-1 manga-shadow">
                    <div
                        class="w-10 h-10 bg-secondary-container manga-border rounded-full absolute left-1/3 flex items-center justify-center cursor-pointer hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-tertiary">unfold_more</span>
                    </div>
                </div>
                <div class="bg-tertiary px-4 py-2 rounded-xl manga-shadow">
                    <span class="text-white font-black text-sm tracking-widest">方向調整桿</span>
                </div>
            </div>
            <!-- Spin Control Button (The Sticker Effect) -->
            <div
                class="group relative w-32 h-32 bg-surface-container-lowest manga-border rounded-full flex items-center justify-center manga-shadow cursor-pointer hover:bg-secondary-container transition-all active:translate-x-1 active:translate-y-1 active:shadow-none">
                <div
                    class="w-24 h-24 rounded-full border-4 border-dashed border-tertiary/30 flex items-center justify-center">
                    <div class="w-4 h-4 bg-error-dim rounded-full manga-border -translate-x-4 -translate-y-2"></div>
                </div>
                <span
                    class="absolute -top-4 -right-4 bg-primary-container manga-border p-2 rounded-lg text-xs font-black text-tertiary rotate-12">SPIN</span>
            </div>
        </div>
        <!-- Bottom HUD: Active HUD Elements -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-6 items-end">
            <!-- Player Status Card -->
            <div class="bg-white p-4 manga-border manga-shadow rounded-2xl flex items-center gap-4 min-w-[300px]">
                <div
                    class="w-16 h-16 bg-secondary-container manga-border rounded-xl flex items-center justify-center rotate-[-3deg]">
                    <span class="material-symbols-outlined text-tertiary text-4xl"
                        style="font-variation-settings: 'FILL' 1;">stars</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-tertiary font-black text-lg leading-none">PLAYER 1</span>
                    <span class="text-secondary font-bold text-2xl">45,800 pts</span>
                    <div class="w-full h-2 bg-surface-dim rounded-full mt-2 overflow-hidden">
                        <div class="w-[80%] h-full bg-primary-container"></div>
                    </div>
                </div>
            </div>
            <!-- Action Button (FAB Style) -->
            <button
                class="w-24 h-24 bg-primary-container manga-border rounded-full manga-shadow flex flex-col items-center justify-center text-tertiary active:translate-x-1 active:translate-y-1 active:shadow-none transition-all group">
                <span class="material-symbols-outlined text-4xl group-hover:scale-110 transition-transform"
                    style="font-variation-settings: 'FILL' 1;">bolt</span>
                <span class="font-black text-sm">擊球!</span>
            </button>
        </div>
        <!-- Floating UI Labels (Japanese/Traditional Chinese Mix style) -->
        <div class="absolute top-24 left-1/2 -translate-x-1/2 pointer-events-none">
            <div
                class="bg-secondary-container manga-border px-8 py-2 rounded-full rotate-[-2deg] flex items-center gap-3">
                <span class="material-symbols-outlined text-tertiary">timer</span>
                <span class="text-tertiary font-black text-2xl tracking-widest">剩餘時間 00:42</span>
            </div>
        </div>
    </main>
    <!-- Overlay FX: Screen Border Glow -->
    <div class="fixed inset-0 pointer-events-none border-[12px] border-tertiary/10 rounded-[3rem] z-30"></div>
</body>

</html>
